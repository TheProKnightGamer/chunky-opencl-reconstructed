name: Development

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        java-package: jdk

    - name: Clone and build Chunky (latest master)
      run: |
        git clone --depth 1 https://github.com/chunky-dev/chunky.git /tmp/chunky
        cd /tmp/chunky
        chmod +x gradlew
        ./gradlew :chunky:publishToMavenLocal

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChunkyClPlugin
        path: build/libs/chunky-opencl.jar
